<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monopoli del Rosario</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="topBar">
        <h1>Monopoli del Rosario</h1>
        <div class="topActions">
          <button id="readableToggleBtn" class="ghost">Modo legible: OFF</button>
          <button id="adminBtn" class="ghost">Administrador</button>
        </div>
      </div>
      <p class="subtitle">Juega al monopoli mientras aprendes los misterios del rosario.</p>

      <section class="panel" id="userPanel">
        <h2>Usuario</h2>
        <div id="loginBox">
          <label class="field">Nombre de usuario
            <input id="usernameInput" placeholder="ejemplo: alumno1" maxlength="24" />
          </label>
          <label class="field">PIN
            <input id="pinInput" type="password" placeholder="mínimo 4 caracteres" maxlength="24" />
          </label>
          <button id="loginBtn">Entrar / Crear usuario</button>
        </div>
        <div id="sessionBox" class="hidden">
          <p id="sessionText"></p>
          <button id="logoutBtn" class="ghost">Cerrar sesión</button>
        </div>
      </section>

      <section class="panel" id="setupPanel">
        <h2>Nueva partida</h2>
        <label class="field">
          Nombre de la partida
          <input id="gameName" placeholder="Escribe un nombre" maxlength="40" />
        </label>
        <div class="field">
          Duración de la partida
          <div class="durationRadios">
            <label><input type="radio" name="duration" value="corta" /> Corta</label>
            <label><input type="radio" name="duration" value="media" checked /> Media</label>
            <label><input type="radio" name="duration" value="larga" /> Larga</label>
          </div>
        </div>
        <div id="playersForm"></div>
        <button id="addPlayerBtn" class="ghost">Agregar jugador</button>
        <button id="startBtn">Comenzar partida</button>
      </section>

      <section class="panel" id="savedPanel">
        <h2>Partidas guardadas</h2>
        <button id="refreshSavedBtn" class="ghost">Actualizar lista</button>
        <ul id="savedGames"></ul>
      </section>

      <section class="panel hidden" id="gamePanel">
        <div class="gameHeader">
          <div>
            <h2 id="gameTitle"></h2>
            <div id="turnInfo"></div>
          </div>
          <button id="finishBtn" class="ghost">Terminar partida</button>
        </div>

        <div id="playersInfo" class="playersInfo"></div>

        <div class="rollRow">
          <div>
            <button id="rollBtn" class="rollBtn">🎲 Lanzar dados</button>
          </div>
          <div class="eventsCard">
            <h3>Últimos 3 eventos</h3>
            <ul id="recentLog" class="recentLog"></ul>
          </div>
        </div>

        <div class="boardContainer">
          <div id="board" class="board"></div>
        </div>

      </section>

      <div id="adminModal" class="adminModal hidden">
        <div class="adminDialog">
          <div class="adminHead">
            <h2>Administrador</h2>
            <div class="adminHeadActions">
              <button id="adminSaveBtn" class="hidden">Guardar cambios</button>
              <button id="adminCloseBtn" class="ghost">Cerrar</button>
            </div>
          </div>

          <div id="adminLoginBox">
            <label class="field">
              Contraseña de administrador
              <input id="adminPassword" type="password" placeholder="Introduce contraseña" />
            </label>
            <button id="adminLoginBtn">Entrar</button>
          </div>

          <div id="adminEditorBox" class="hidden">
            <div class="adminSectionHead">
              <h3>Preguntas</h3>
              <button id="addQuestionBtn">+ Pregunta</button>
            </div>
            <div id="questionsFields" class="adminList"></div>

            <div class="adminSectionHead">
              <h3>Sorpresas</h3>
              <button id="addSurpriseBtn">+ Sorpresa</button>
            </div>
            <div id="surprisesFields" class="adminList"></div>

          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
  </html>
